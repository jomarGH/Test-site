}
.progress-title {

.dropdown-list {

  box-shadow: 0 10px 30px rgba(0,0,0,0.4);

  padding: 0;
  display: none;
}
.dropdown-list li {
  padding: 10px 14px;
  cursor: pointer;
  font-size: 14px;
  color: #333;
  border-bottom: 1px solid #eee;
  transition: background 0.2s;
  background: white;
}
.dropdown-list li:last-child {

}
.dropdown-list li:hover {

}
.dropdown-list li.selected {
  background: #d4a25f;
  color: white;
}
.no-results {
  padding: 10px 14px;
  color: #999;
  font-style: italic;

}

html, body, .container, .card, .progress-section, .book-input-wrapper {

}

  .logo.right { width:62px; }

</style>

<body>
<div class="container">
  <div class="card">
    <div class="header">
      <img src="rblogo church.png" class="logo left" alt="Church Logo">
      <div class="community-name">San Pedro Calungsod Filipino Catholic Community Qatar</div>
      <img src="rblogo spcfcc.png" class="logo right" alt="Community Logo">
    </div>
    
    <h1>📖 "The Word Journey”</h1>
    <div class="subtitle">Completion Form</div>

    <div id="searchSection" class="search-section">
      <form id="form">
        <input type="text" id="refno" placeholder="Ref.No (e.g. 26001) Option 1">
        <input type="text" id="mobile" placeholder="Mobile (e.g. 66694789) Option 2">
        <button type="submit" id="submitBtn">Search Now</button>
      </form>
    </div>

    <div id="msg"></div>

    <div id="progressSection" class="progress-section" style="display: none;">
      <div class="progress-title">📚 Bible Reading Progress</div>
      <div id="recordInfo" class="record-info"></div>
      
      <label>📖 Book Finished</label>
      <div class="book-input-wrapper">
        <div class="combobox-container" id="bookCombobox">
          <input type="text" id="bookFinished" class="combobox-input" placeholder="Select or type book name..." autocomplete="off">
          <ul id="bookDropdown" class="dropdown-list"></ul>
        </div>
        <div class="checkbox-wrapper">
          <input type="checkbox" id="bookCompletedCheckbox" title="Mark entire book as completed">
        </div>
      </div>
      
      <div id="bottomSection" class="bottom-section hide">
        <label>🔢 Chapters Finished</label>
        <input type="text" id="chaptersFinished" placeholder="e.g., 1-12 or 5">
        
        <label>✝️ Verses Finished</label>
        <input type="text" id="versesFinished" placeholder="e.g., 1-30 or 15">
        
        <label>📅 Completion Date</label>
        <div class="completion-date-input">
          <input type="date" id="completionDate">
        </div>
        
        <button id="saveProgressBtn" class="btn-secondary">💾 Save Reading Progress</button>
        <button id="resetSearchBtn" class="btn-reset">🔄 Reset & Search New</button>
      </div>
    </div>

    <div id="adminLinkSection" class="admin-link-section hide">
      <a href="admin.html" target="_blank">🔐 Admin Panel</a>
    </div>

    <div class="footer">"Your word is a lamp to my feet.” (Psalm 119:105)</div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxVkBkjIfJFoNnN8NpiN-lKZ2xK4n-vrjDHZkFiKQ8BIh9ci65JZCL8RTj1vzr7Ocd36A/exec";
  
  // ==================== BIBLE BOOKS DATA WITH CHAPTER AND VERSE COUNTS ====================
  const bibleBooksData = {
    "Genesis": { chapters: 50, verses: 1533 },
    "Exodus": { chapters: 40, verses: 1213 },
    "Leviticus": { chapters: 27, verses: 859 },
    "Numbers": { chapters: 36, verses: 1288 },
    "Deuteronomy": { chapters: 34, verses: 959 },
    "Joshua": { chapters: 24, verses: 658 },
    "Judges": { chapters: 21, verses: 618 },
    "Ruth": { chapters: 4, verses: 85 },
    "1 Samuel": { chapters: 31, verses: 810 },
    "2 Samuel": { chapters: 24, verses: 695 },
    "1 Kings": { chapters: 22, verses: 816 },
    "2 Kings": { chapters: 25, verses: 719 },
    "1 Chronicles": { chapters: 29, verses: 942 },
    "2 Chronicles": { chapters: 36, verses: 822 },
    "Ezra": { chapters: 10, verses: 280 },
    "Nehemiah": { chapters: 13, verses: 406 },
    "Esther": { chapters: 10, verses: 167 },
    "Job": { chapters: 42, verses: 1070 },
    "Psalms": { chapters: 150, verses: 2461 },
    "Proverbs": { chapters: 31, verses: 915 },
    "Ecclesiastes": { chapters: 12, verses: 222 },
    "Song of Solomon": { chapters: 8, verses: 117 },
    "Isaiah": { chapters: 66, verses: 1292 },
    "Jeremiah": { chapters: 52, verses: 1364 },
    "Lamentations": { chapters: 5, verses: 154 },
    "Ezekiel": { chapters: 48, verses: 1273 },
    "Daniel": { chapters: 12, verses: 357 },
    "Hosea": { chapters: 14, verses: 197 },
    "Joel": { chapters: 3, verses: 73 },
    "Amos": { chapters: 9, verses: 146 },
    "Obadiah": { chapters: 1, verses: 21 },
    "Jonah": { chapters: 4, verses: 48 },
    "Micah": { chapters: 7, verses: 105 },
    "Nahum": { chapters: 3, verses: 56 },
    "Habakkuk": { chapters: 3, verses: 56 },
    "Zephaniah": { chapters: 3, verses: 53 },
    "Haggai": { chapters: 2, verses: 38 },
    "Zechariah": { chapters: 14, verses: 211 },
    "Malachi": { chapters: 4, verses: 55 },
    "Matthew": { chapters: 28, verses: 1071 },
    "Mark": { chapters: 16, verses: 678 },
    "Luke": { chapters: 24, verses: 1151 },
    "John": { chapters: 21, verses: 879 },
    "Acts": { chapters: 28, verses: 1007 },
    "Romans": { chapters: 16, verses: 433 },
    "1 Corinthians": { chapters: 16, verses: 437 },
    "2 Corinthians": { chapters: 13, verses: 257 },
    "Galatians": { chapters: 6, verses: 149 },
    "Ephesians": { chapters: 6, verses: 155 },
    "Philippians": { chapters: 4, verses: 104 },
    "Colossians": { chapters: 4, verses: 95 },
    "1 Thessalonians": { chapters: 5, verses: 89 },
    "2 Thessalonians": { chapters: 3, verses: 47 },
    "1 Timothy": { chapters: 6, verses: 113 },
    "2 Timothy": { chapters: 4, verses: 83 },
    "Titus": { chapters: 3, verses: 46 },
    "Philemon": { chapters: 1, verses: 25 },
    "Hebrews": { chapters: 13, verses: 303 },
    "James": { chapters: 5, verses: 108 },
    "1 Peter": { chapters: 5, verses: 105 },
    "2 Peter": { chapters: 3, verses: 61 },
    "1 John": { chapters: 5, verses: 105 },
    "2 John": { chapters: 1, verses: 13 },
    "3 John": { chapters: 1, verses: 14 },
    "Jude": { chapters: 1, verses: 25 },
    "Revelation": { chapters: 22, verses: 404 }
  };
  
  const bibleBooks = Object.keys(bibleBooksData);
  
  const searchSection = document.getElementById('searchSection');
  const refnoInput = document.getElementById('refno');
  const mobileInput = document.getElementById('mobile');
  const submitBtn = document.getElementById('submitBtn');
  const msgDiv = document.getElementById('msg');
  const progressSection = document.getElementById('progressSection');
  const recordInfoDiv = document.getElementById('recordInfo');
  const bookInput = document.getElementById('bookFinished');
  const bookCompletedCheckbox = document.getElementById('bookCompletedCheckbox');
  const chaptersInput = document.getElementById('chaptersFinished');
  const versesInput = document.getElementById('versesFinished');
  const completionDateInput = document.getElementById('completionDate');
  const saveProgressBtn = document.getElementById('saveProgressBtn');
  const resetSearchBtn = document.getElementById('resetSearchBtn');
  const bookDropdown = document.getElementById('bookDropdown');
  const bottomSection = document.getElementById('bottomSection');
  const adminLinkSection = document.getElementById('adminLinkSection');

  let currentRecord = null;
  let currentRefNo = null;
  let currentMobile = null;
  let currentName = null;
  let currentRegDate = null;
  let selectedBookIndex = -1;
  let currentFilteredBooks = [...bibleBooks];
  let isBookSelected = false;

  // ==================== HELPER FUNCTIONS ====================
  function getBookData(bookName) {
    return bibleBooksData[bookName] || { chapters: 0, verses: 0 };
  }

  function calculateVersesFromChapters(bookName, chaptersValue) {
    const bookData = getBookData(bookName);
    if (!bookData.verses || !bookData.chapters) return 0;
    // Calculate average verses per chapter, then multiply by chapters read
    const avgVersesPerChapter = bookData.verses / bookData.chapters;
    const chaptersNum = parseFloat(chaptersValue) || 0;
    return Math.round(avgVersesPerChapter * chaptersNum);
  }

  // ==================== UPDATE CHAPTERS AND VERSES BASED ON CHECKBOX ====================
  function updateChapterVerseState() {
    const bookValue = bookInput.value.trim();
    const isBookCompleted = bookCompletedCheckbox.checked;
    const bookData = getBookData(bookValue);
    
    if (bookValue !== '' && isBookCompleted) {
      // Book Completed = TRUE: Fill with total chapters and verses, then disable
      chaptersInput.value = bookData.chapters;
      versesInput.value = bookData.verses;
      chaptersInput.disabled = true;
      versesInput.disabled = true;
    } else if (bookValue !== '' && !isBookCompleted) {
      // Book Completed = FALSE: Enable inputs for manual entry
      chaptersInput.disabled = false;
      versesInput.disabled = false;
      
      // If chapters input has a value, auto-calculate verses
      const chaptersVal = chaptersInput.value.trim();
      if (chaptersVal && !isNaN(chaptersVal)) {
        const calculatedVerses = calculateVersesFromChapters(bookValue, chaptersVal);
        if (calculatedVerses > 0) {
          versesInput.value = calculatedVerses;
        }
      }
    } else {
      // No book selected: reset and disable
      chaptersInput.value = '';
      versesInput.value = '';
      chaptersInput.disabled = false;
      versesInput.disabled = false;
    }
  }
  
  // Listen to chapters input change for auto-calculation
  function handleChaptersInput() {
    const bookValue = bookInput.value.trim();
    const isBookCompleted = bookCompletedCheckbox.checked;
    
    if (bookValue !== '' && !isBookCompleted) {
      const chaptersVal = chaptersInput.value.trim();
      if (chaptersVal && !isNaN(chaptersVal)) {
        const calculatedVerses = calculateVersesFromChapters(bookValue, chaptersVal);
        if (calculatedVerses > 0) {
          versesInput.value = calculatedVerses;
        }
      }
    }
  }
  
  bookCompletedCheckbox.addEventListener('change', updateChapterVerseState);
  chaptersInput.addEventListener('input', handleChaptersInput);

  // ==================== DROPDOWN FUNCTIONS ====================
  function updateDropdownPosition() {
    const inputRect = bookInput.getBoundingClientRect();
    bookDropdown.style.position = 'fixed';
    bookDropdown.style.top = (inputRect.bottom + window.scrollY) + 'px';
    bookDropdown.style.left = inputRect.left + 'px';
    bookDropdown.style.width = inputRect.width + 'px';
  }

  function hideBottomAndAdmin() {
    bottomSection.classList.add('hide');
    adminLinkSection.classList.add('hide');
  }

  function showBottomAndAdmin() {
    bottomSection.classList.remove('hide');
    adminLinkSection.classList.remove('hide');
  }

  function filterBooks(searchTerm) {
    if (!searchTerm.trim()) return bibleBooks;
    const term = searchTerm.toLowerCase();
    return bibleBooks.filter(book => book.toLowerCase().includes(term));
  }

  function renderDropdown(books) {
    bookDropdown.innerHTML = '';
    if (books.length === 0) {
      const li = document.createElement('li');
      li.textContent = '📖 No matching books found';
      li.className = 'no-results';
      bookDropdown.appendChild(li);
    } else {
      books.forEach((book, index) => {
        const li = document.createElement('li');
        li.textContent = book;
        li.addEventListener('click', (e) => {
          e.stopPropagation();
          selectBook(book);
        });
        li.addEventListener('mouseenter', () => {
          document.querySelectorAll('.dropdown-list li').forEach(item => item.classList.remove('selected'));
          li.classList.add('selected');
          selectedBookIndex = index;
        });
        bookDropdown.appendChild(li);
      });
    }
    updateDropdownPosition();
    bookDropdown.style.display = 'block';
  }

  function selectBook(book) {
    bookInput.value = book;
    isBookSelected = true;
    bookDropdown.style.display = 'none';
    selectedBookIndex = -1;
    
    // Reset checkbox and update chapter/verse state based on book data
    bookCompletedCheckbox.checked = false;
    updateChapterVerseState();
    
    showBottomAndAdmin();
    setDefaultCompletionDate();
    bookInput.blur();
  }

  function updateDropdown(searchTerm) {
    currentFilteredBooks = filterBooks(searchTerm);
    renderDropdown(currentFilteredBooks);
    selectedBookIndex = -1;
  }

  function handleBookInput() {
    const searchTerm = bookInput.value;
    
    if (searchTerm.trim() !== bookInput.value.trim() || searchTerm.trim() === '') {
      isBookSelected = false;
      if (searchTerm.trim() === '') {
        bookCompletedCheckbox.checked = false;
      }
      hideBottomAndAdmin();
    }
    
    if (searchTerm.trim() === '') {
      bookDropdown.style.display = 'none';
      updateChapterVerseState();
      return;
    }
    updateDropdown(searchTerm);
  }

  function handleBookKeydown(e) {
    const items = bookDropdown.querySelectorAll('li');
    const visibleItems = Array.from(items).filter(item => !item.classList.contains('no-results'));
    
    if (visibleItems.length === 0) return;
    
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      selectedBookIndex = Math.min(selectedBookIndex + 1, visibleItems.length - 1);
      visibleItems.forEach((item, idx) => {
        if (idx === selectedBookIndex) item.classList.add('selected');
        else item.classList.remove('selected');
      });
      if (visibleItems[selectedBookIndex]) visibleItems[selectedBookIndex].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      selectedBookIndex = Math.max(selectedBookIndex - 1, 0);
      visibleItems.forEach((item, idx) => {
        if (idx === selectedBookIndex) item.classList.add('selected');
        else item.classList.remove('selected');
      });
      if (visibleItems[selectedBookIndex]) visibleItems[selectedBookIndex].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (selectedBookIndex >= 0 && visibleItems[selectedBookIndex]) {
        selectBook(visibleItems[selectedBookIndex].textContent);
      } else if (currentFilteredBooks.length === 1) {
        selectBook(currentFilteredBooks[0]);
      }
    } else if (e.key === 'Escape') {
      bookDropdown.style.display = 'none';
      selectedBookIndex = -1;
    }
  }

  function closeDropdown(e) {
    const combobox = document.getElementById('bookCombobox');
    if (!combobox.contains(e.target)) {
      bookDropdown.style.display = 'none';
      selectedBookIndex = -1;
    }
  }

  function handleBookFocus() {
    hideBottomAndAdmin();
  }

  window.addEventListener('scroll', () => {
    if (bookDropdown.style.display === 'block') updateDropdownPosition();
  });
  window.addEventListener('resize', () => {
    if (bookDropdown.style.display === 'block') updateDropdownPosition();
  });

  bookInput.addEventListener('input', handleBookInput);
  bookInput.addEventListener('keydown', handleBookKeydown);
  bookInput.addEventListener('focus', handleBookFocus);
  bookInput.addEventListener('click', (e) => {
    e.stopPropagation();
    hideBottomAndAdmin();
    if (bookInput.value.trim() !== '') updateDropdown(bookInput.value);
  });
  document.addEventListener('click', closeDropdown);

  function setDefaultCompletionDate() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    completionDateInput.value = `${yyyy}-${mm}-${dd}`;
  }

  function hideSearchSection() { searchSection.classList.add('hide'); }
  function showSearchSection() { searchSection.classList.remove('hide'); }

  function updateSearchButton() {
    if (searchSection.classList.contains('hide')) return;
    const refno = refnoInput.value.trim();
    const mobile = mobileInput.value.trim();
    const hasRefno = refno !== '';
    const hasMobile = mobile !== '';
    if ((!hasRefno && !hasMobile) || (hasRefno && hasMobile)) {
      submitBtn.disabled = true;
      refnoInput.disabled = false;
      mobileInput.disabled = false;
    } else if (hasRefno && !hasMobile) {
      submitBtn.disabled = false;
      refnoInput.disabled = false;
      mobileInput.disabled = true;
      mobileInput.value = '';
    } else if (!hasRefno && hasMobile) {
      submitBtn.disabled = false;
      mobileInput.disabled = false;
      refnoInput.disabled = true;
      refnoInput.value = '';
    }
  }

  refnoInput.addEventListener('input', updateSearchButton);
  mobileInput.addEventListener('input', updateSearchButton);

  async function searchParticipant(event) {
    event.preventDefault();
    const refno = refnoInput.value.trim();
    const mobile = mobileInput.value.trim();
    if (!refno && !mobile) {
      showMessage('Please enter either RefNo or Mobile number', 'error');
      return;
    }
    submitBtn.disabled = true;
    const originalBtnText = submitBtn.innerHTML;
    submitBtn.innerHTML = '⏳ Searching...';
    msgDiv.innerHTML = '<div class="success" style="background:#e0e0d0;">Searching database...</div>';
    try {
      let queryParam = '';
      if (refno) queryParam = `?refno=${encodeURIComponent(refno)}`;
      else if (mobile) queryParam = `?mobile=${encodeURIComponent(mobile)}`;
      const response = await fetch(SCRIPT_URL + queryParam, { method: 'GET', mode: 'cors', headers: { 'Accept': 'application/json' } });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const result = await response.json();
      let records = [];
      if (Array.isArray(result)) records = result;
      else if (result.data && Array.isArray(result.data)) records = result.data;
      else if (result.data && !Array.isArray(result.data)) records = [result.data];
      else if (result.RefNo) records = [result];
      let foundRecord = null;
      if (refno) foundRecord = records.find(r => String(r.RefNo) === String(refno));
      else if (mobile) foundRecord = records.find(r => String(r.Mobile) === String(mobile) || String(r.Mobile).endsWith(String(mobile)));
      if (foundRecord) {
        currentRecord = foundRecord;
        currentRefNo = foundRecord.RefNo;
        currentMobile = foundRecord.Mobile;
        currentName = foundRecord.Name || 'N/A';
        currentRegDate = foundRecord.RegistrationDate || 'N/A';
        if (foundRecord.Timestamp) currentRegDate = new Date(foundRecord.Timestamp).toLocaleDateString();
        let displayMobile = String(foundRecord.Mobile);
        if (displayMobile && displayMobile.length === 11 && displayMobile.startsWith('974')) {
          displayMobile = `+${displayMobile.slice(0,3)} ${displayMobile.slice(3,6)} ${displayMobile.slice(6,9)} ${displayMobile.slice(9)}`;
        }
        recordInfoDiv.innerHTML = `<p><strong>📌 RefNo:</strong> ${escapeHtml(String(foundRecord.RefNo))}</p><p><strong>👤 Name:</strong> ${escapeHtml(currentName)}</p><p><strong>📱 Mobile:</strong> ${escapeHtml(displayMobile)}</p><p><strong>📅 Registration Date:</strong> ${escapeHtml(currentRegDate)}</p>`;
        msgDiv.innerHTML = '<div class="success">✅ Participant found! Enter Bible reading progress below.</div>';
        hideSearchSection();
        progressSection.style.display = 'block';
        bookInput.value = '';
        bookCompletedCheckbox.checked = false;
        chaptersInput.value = '';
        versesInput.value = '';
        setDefaultCompletionDate();
        isBookSelected = false;
        hideBottomAndAdmin();
        progressSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      } else {
        msgDiv.innerHTML = `<div class="error">❌ Record Not Found</div>`;
        progressSection.style.display = 'none';
      }
    } catch (error) {
      console.error(error);
      msgDiv.innerHTML = `<div class="error">⚠️ Connection error: ${error.message}</div>`;
      progressSection.style.display = 'none';
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = originalBtnText;
    }
  }

  async function saveProgress() {
    if (!currentRefNo && !currentMobile) {
      showMessage('No participant selected. Please search first.', 'error');
      return;
    }
    
    const book = bookInput.value.trim();
    const isBookCompleted = bookCompletedCheckbox.checked;
    const chapters = chaptersInput.value.trim();
    const verses = versesInput.value.trim();
    const completionDate = completionDateInput.value;
    
    if (!book) { 
      showMessage('Please select or enter a book.', 'error'); 
      return; 
    }
    
    if (!isBookCompleted && !chapters && !verses) { 
      showMessage('Please either check "Book Completed" or enter Chapters/Verses.', 'error'); 
      return; 
    }
    
    saveProgressBtn.disabled = true;
    const originalBtnText = saveProgressBtn.innerHTML;
    saveProgressBtn.innerHTML = '⏳ Saving Progress...';
    
    try {
      const payload = { 
        action: 'saveProgress',
        refno: currentRefNo,
        name: currentName,
        mobile: currentMobile,
        registrationDate: currentRegDate,
        bookFinished: book,
        bookCompleted: isBookCompleted,
        chaptersFinished: chapters,
        versesFinished: verses,
        completionDate: completionDate,
        timestamp: new Date().toISOString()
      };
      
      console.log('Saving payload:', payload);
      
      const response = await fetch(SCRIPT_URL, { 
        method: 'POST', 
        mode: 'cors', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify(payload) 
      });
      
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const result = await response.json();
      console.log('Save result:', result);
      
      if (result.status === 'success') {
        showMessage('✅ Reading progress saved successfully!', 'success');
        bookInput.value = '';
        bookCompletedCheckbox.checked = false;
        chaptersInput.value = '';
        versesInput.value = '';
        setDefaultCompletionDate();
        isBookSelected = false;
        hideBottomAndAdmin();
      } else {
        throw new Error(result.message || 'Save failed');
      }
    } catch (error) {
      console.error('Save error:', error);
      showMessage('❌ Failed to save progress: ' + error.message, 'error');
    } finally {
      saveProgressBtn.disabled = false;
      saveProgressBtn.innerHTML = originalBtnText;
    }
  }

  function resetSearch() {
    refnoInput.value = '';
    mobileInput.value = '';
    refnoInput.disabled = false;
    mobileInput.disabled = false;
    msgDiv.innerHTML = '';
    progressSection.style.display = 'none';
    currentRecord = null;
    currentRefNo = null;
    currentMobile = null;
    currentName = null;
    currentRegDate = null;
    bookInput.value = '';
    bookCompletedCheckbox.checked = false;
    chaptersInput.value = '';
    versesInput.value = '';
    setDefaultCompletionDate();
    recordInfoDiv.innerHTML = '';
    isBookSelected = false;
    hideBottomAndAdmin();
    showSearchSection();
    updateSearchButton();
    refnoInput.focus();
    showMessage('Search reset. You can search for another participant.', 'success');
  }

  function showMessage(message, type) {
    msgDiv.innerHTML = `<div class="${type === 'error' ? 'error' : 'success'}">${message}</div>`;
    setTimeout(() => { if (msgDiv.innerHTML.includes(message)) msgDiv.innerHTML = ''; }, 4000);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }

  document.getElementById('form').addEventListener('submit', searchParticipant);
  saveProgressBtn.addEventListener('click', saveProgress);
  resetSearchBtn.addEventListener('click', resetSearch);
  
  refnoInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !submitBtn.disabled && !searchSection.classList.contains('hide')) { e.preventDefault(); searchParticipant(e); } });
  mobileInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !submitBtn.disabled && !searchSection.classList.contains('hide')) { e.preventDefault(); searchParticipant(e); } });

  updateSearchButton();
  setDefaultCompletionDate();
  console.log('Ready');
</script>
</body>
</html>
