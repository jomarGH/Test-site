<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Completion Page</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
* { box-sizing:border-box; }
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#f5efe6,#e8dccb);
}
.container {
  max-width:500px;
  margin:auto;
  padding:15px;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card {
  width:100%;
  max-width:420px;
  background:url("backgrnd1.png") no-repeat center center;
  background-size:cover;
  border-radius:20px;
  padding:25px;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
  text-align:center;
  color:white;
  position:relative;
}
.card::before {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
  border-radius:20px;
}
.card * { position:relative; z-index:1; }

h1 { font-family:'Playfair Display'; }

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:#b8894a;
  color:white;
  font-weight:bold;
}

.success { background:#e8f5e9; color:black; padding:12px; margin-top:10px; border-radius:10px; }
.error { background:#ffe0e0; padding:12px; margin-top:10px; border-radius:10px; }

.footer { font-size:12px; margin-top:15px; color:#f1e6d6; }
</style>
</head>

<body>
<div class="container">
<div class="card">

<h1>📖 Completion Page</h1>
<div class="subtitle">Bible Progress</div>

<!-- SEARCH -->
<input id="refno" placeholder="RefNo">
<input id="mobile" placeholder="Mobile">
<input id="name" placeholder="Name (family search)">
<button onclick="search()">🔍 Search</button>

<div id="info"></div>

<hr>

<!-- SAVE -->
<input id="book" placeholder="Book (Genesis)">
<input id="chapters" placeholder="Chapters">
<input id="verses" placeholder="Verses">
<input id="date" type="date">

<button onclick="save()">💾 Save Progress</button>

<div class="footer">
"Your word is a lamp to my feet." — Psalm 119:105
</div>

</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxCf3rCLl8DpHPxcmggHoXwxR1KVfM6Eo3ZT152btupUdKx7QtNREzHCdQ-deIrbLV29w/exec";

let data = [];
let current = null;

/* LOAD */
async function load() {
  const res = await fetch(URL);
  const text = await res.text();
  const json = JSON.parse(text);

  if (Array.isArray(json)) {
    data = json;
    console.log("Loaded:", data.length);
  } else {
    alert("Backend error");
  }
}

/* SEARCH */
function search() {
  const ref = document.getElementById("refno").value.trim();
  const mob = document.getElementById("mobile").value.trim();
  const name = document.getElementById("name").value.toLowerCase().trim();

  const inputMob = mob.replace(/\D/g,'').slice(-8);

  current = data.find(r => {
    const rRef = String(r.RefNo || "").trim();
    const rMob = String(r.Mobile || "").replace(/\D/g,'').slice(-8);
    const rName = String(r.Name || "").toLowerCase().trim();

    return (
      (ref && rRef === ref) ||
      (mob && rMob === inputMob) ||
      (name && rName.includes(name))
    );
  });

  const info = document.getElementById("info");

  if (current) {
    info.innerHTML = `<div class="success">✅ ${current.Name}</div>`;
  } else {
    info.innerHTML = `<div class="error">❌ Not found</div>`;
  }
}

/* SAVE */
async function save() {
  if (!current) return alert("Search first");

  const book = document.getElementById("book").value;
  if (!book) return alert("Enter book");

  await fetch(URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      refno: current.RefNo,
      name: current.Name,
      mobile: current.Mobile,
      registrationDate: current.RegistrationDate,
      book: document.getElementById("book").value,
      chapters: document.getElementById("chapters").value,
      verses: document.getElementById("verses").value,
      date: document.getElementById("date").value
    })
  });

  alert("✅ Saved!");
}

load();
</script>

</body>
</html>
