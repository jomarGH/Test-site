<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Completion Page</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
* { box-sizing:border-box; }
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#f5efe6,#e8dccb);
}
.container {
  max-width:500px;
  margin:auto;
  padding:15px;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card {
  width:100%;
  max-width:420px;
  background:url("backgrnd1.png") no-repeat center center;
  background-size:cover;
  border-radius:20px;
  padding:25px;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
  text-align:center;
  color:white;
  position:relative;
}
.card::before {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
  border-radius:20px;
}
.card * { position:relative; z-index:1; }

h1 { font-family:'Playfair Display'; }

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:#b8894a;
  color:white;
  font-weight:bold;
}

.success { background:#e8f5e9; color:black; padding:12px; margin-top:10px; border-radius:10px; }
.error { background:#ffe0e0; padding:12px; margin-top:10px; border-radius:10px; }

.footer { font-size:12px; margin-top:15px; color:#f1e6d6; }
</style>
</head>

<body>
<div class="container">
<div class="card">

<h1>📖 Completion Page</h1>
<div class="subtitle">Bible Progress</div>

<!-- SEARCH -->
<input id="refno" placeholder="RefNo (e.g. 26001)">
<input id="mobile" placeholder="Mobile (e.g. 66694789)">
<input id="name" placeholder="Family (e.g. Juan)">
<button onclick="search()">🔍 Search</button>

<div id="info"></div>
<div id="progressBox" style="margin-top:15px; font-weight:bold;"></div>

<hr>

<!-- SAVE -->
<input id="book" list="books" placeholder="Select Book">
<datalist id="books"></datalist>
<input id="chapters" placeholder="Chapters">
<input id="verses" placeholder="Verses">
<input id="date" type="date">

<button onclick="save()">💾 Save Progress</button>

<div class="footer">
"Your word is a lamp to my feet." — Psalm 119:105
</div>

</div>
</div>

const datalist = document.getElementById("books");

Object.keys(bibleBooksData).forEach(book => {
  const option = document.createElement("option");
  option.value = book;
  datalist.appendChild(option);
});

/* LOAD */
let users = [];
let progressData = [];

async function load() {
  try {
    const res = await fetch(URL);
    const text = await res.text();

    console.log("RAW:", text);

    const json = JSON.parse(text);

    // ✅ CASE 1: OLD FORMAT (array)
    if (Array.isArray(json)) {
      users = json;
      progressData = []; // no progress yet
      console.log("Users:", users.length);
      console.log("Progress: 0");
      return;
    }

    // ✅ CASE 2: NEW FORMAT (object)
    if (json.status === "success") {
      users = json.users || [];
      progressData = json.progress || [];

      console.log("Users:", users.length);
      console.log("Progress:", progressData.length);
    } else {
      console.error("Backend error:", json);
      alert("❌ Backend error");
    }

  } catch (err) {
    console.error("Load failed:", err);
    alert("❌ Failed to load data");
  }
}

/* SEARCH */
function search() {
  const ref = document.getElementById("refno").value.trim();
  const mob = document.getElementById("mobile").value.trim();
  const name = document.getElementById("name").value.toLowerCase().trim();

  const inputMob = mob.replace(/\D/g,'').slice(-8);

  current = users.find(r => {
    const rRef = String(r.RefNo || "").trim();
    const rMob = String(r.Mobile || "").replace(/\D/g,'').slice(-8);
    const rName = String(r.Name || "").toLowerCase().trim();

    return (
      (ref && rRef === ref) ||
      (mob && rMob === inputMob) ||
      (name && rName.includes(name))
    );
  });

  const info = document.getElementById("info");

  if (current) {
    info.innerHTML = `<div class="success">✅ ${current.Name}</div>`;
  } else {
    info.innerHTML = `<div class="error">❌ Not found</div>`;
  }
}

function updateUserProgress() {
  if (!current) return;

  const userRef = current.RefNo;

  // 🔢 count total books finished by this user
  const userRecords = data.filter(r => String(r.RefNo) === String(userRef));

  const totalBooks = userRecords.length;
  const totalBibleBooks = 66;

  const percent = ((totalBooks / totalBibleBooks) * 100).toFixed(1);

  document.getElementById("progressBox").innerHTML =
    `📊 Progress: ${totalBooks}/66 books (${percent}%)`;
}

/* SAVE */
async function save() {
  if (!current) return alert("Search first");

  const book = document.getElementById("book").value;
  if (!book) return alert("Enter book");

  await fetch(URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      refno: current.RefNo,
      name: current.Name,
      mobile: current.Mobile,
      registrationDate: current.RegistrationDate,
      book: document.getElementById("book").value,
      chapters: document.getElementById("chapters").value,
      verses: document.getElementById("verses").value,
      date: document.getElementById("date").value
    })
  });

  alert("✅ Saved!");
}

load();
</script>

</body>
</html>
